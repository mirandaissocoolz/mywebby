<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Pad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;       /* fallback */
      min-height: 100dvh;      /* dynamic viewport — correct on mobile */
      overflow: hidden;
    }

    /* Scene: holds the scaled device. Its width/height + the
       device-scale transform are set dynamically in JS so the device
       always fits the viewport (minus body padding) and stays centered. */
    .scene {
      position: relative;
      flex-shrink: 0;
      /* Sensible defaults if JS hasn't run yet — JS will override. */
      width: 550.34px;
      height: 563.24px;
    }

    .device-scale {
      transform: scale(0.14);  /* overridden by JS */
      transform-origin: top left;
      position: absolute;
      top: 0;
      left: 0;
      width: 3931px;
      height: 4023.12px;
    }

    /* ── SHELL (frosted outer body) ── */
    .shell {
      position: absolute;
      inset: 0;
      border-radius: 411.995px;
      background: rgba(202,202,202,0.5);
      backdrop-filter: blur(115.868px);
      box-shadow:
        inset 0px -66.21px 154.491px 0px white,
        inset 0px -115.359px 22.07px 0px black,
        inset -132.421px 0px 66.21px 0px rgba(24,24,24,0.25),
        inset 132.421px 0px 66.21px 0px rgba(24,24,24,0.25),
        inset 0px 46.347px 92.694px 0px rgba(24,24,24,0.5),
        inset 0px 0px 154.491px 0px white,
        inset 0px 44.14px 88.28px 0px rgba(55,48,48,0.4);
    }

    /* ── CUTOUT (inner lighter recess) ── */
    .cutout {
      position: absolute;
      width: 3352.576px;
      height: 3329.019px;
      left: 276.78px;
      top: 304.93px;
      border-radius: 189.518px;
      background: linear-gradient(to bottom,
        rgba(255,255,255,0.5) 0%,
        rgba(230,230,230,0.44) 19.792%,
        rgba(255,255,255,0.01) 100%);
      backdrop-filter: blur(115.868px);
      box-shadow:
        inset 0px -66.21px 154.491px 0px white,
        inset 0px -22.07px 22.07px 0px black,
        inset -132.421px 0px 66.21px 0px rgba(24,24,24,0.25),
        inset 132.421px 0px 66.21px 0px rgba(24,24,24,0.25),
        inset 0px 46.347px 92.694px 0px rgba(24,24,24,0.5),
        inset 0px 0px 154.491px 0px white,
        inset 0px 44.14px 88.28px 0px rgba(55,48,48,0.4);
    }

    /* ── USB connector nub ── */
    .usb-connector {
      position: absolute;
      width: 323.315px;
      height: 409.455px;
      left: 1791.41px;
      top: 0.47px;
      background: rgba(202,202,202,0.5);
      box-shadow:
        inset 0px -12.36px 154.491px 0px white,
        inset 0px -115.359px 22.07px 0px rgba(0,0,0,0.83),
        inset -59.053px 0px 23.346px 0px rgba(24,24,24,0.25),
        inset 59.053px 0px 26.505px 0px rgba(24,24,24,0.25),
        inset 0px 46.347px 92.694px 0px rgba(24,24,24,0.5),
        inset 0px 0px 154.491px 0px white,
        inset 0px 44.14px 88.28px 0px rgba(55,48,48,0.4);
    }

    /* ── SILVER PLATE ── */
    .plate {
      position: absolute;
      width: 3137.218px;
      height: 3137.22px;
      left: 383.735px;
      top: 442.95px;
      border-radius: 137.332px;
      border: 4.716px solid rgba(0,0,0,0.25);
      background: linear-gradient(to bottom, #e1e1e1, #c6c6c6);
      box-shadow:
        inset 0px 8.24px 6.455px 0px rgba(255,255,255,0.19),
        inset 0px -19.226px 5.493px 0px rgba(0,0,0,0.93);
      overflow: hidden;
    }

    .plate-texture {
      position: absolute;
      inset: 0;
      background-image: url('https://www.figma.com/api/mcp/asset/39bbd13a-a094-4711-b7f8-eeae2d5db777');
      background-size: 2811.179px 2811.179px;
      background-position: top left;
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    /* ── SCREWS ── */
    .screws {
      position: absolute;
      top: 3.69%; right: 5.17%; bottom: 4.87%; left: 4.23%;
    }
    .screw {
      position: absolute;
      width: 113.029px;
      height: 113.358px;
    }
    /* Screw image extends well beyond its 113×113 container per the
       Figma negative insets — this is what makes the visible screw
       larger than the inner hex, so the hex sits centered in the
       circle rather than filling it. */
    .screw-bg {
      display: block;
      position: absolute;
      top: -14.05%;
      left: -28.67%;
      width: 157.34%;   /* 100 + 28.67 + 28.67 */
      height: 157.18%;  /* 100 + 14.05 + 43.13 */
    }
    /* Polygon 3 — the screw-slot.svg from Figma. Natural viewBox is
       58.18 × 66.14 (taller than wide), then rotated 90° per the
       Figma design so the visible hex sits point-left/point-right. */
    .screw-poly {
      display: block;
      position: absolute;
      width: 51.4%;
      height: 58.5%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
    }
    /* Per Figma: left screws are unrotated; right screws are rotated
       90° clockwise (which is also why the right-side asset uses the
       darker #0B0B0B fill of screw-alt.svg vs the #262626 of the
       left-side screw.svg). */
    .screw-tl { top: 0; left: 0; }
    .screw-bl { bottom: 0; left: 0; }
    .screw-tr { top: 0; right: 0; transform: rotate(90deg); transform-origin: center; }
    .screw-br { bottom: 0; right: 0; transform: rotate(90deg); transform-origin: center; }

    /* ── BUTTON ROWS ── */
    .button-rows {
      position: absolute;
      left: 696.662px;
      top: 778.718px;
      width: 2510.423px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 73.092px;
    }

    .key-row {
      display: flex;
      gap: 49.429px;
      align-items: center;
    }

    /* ── KEYCAP ── */
    .keycap {
      width: 588.493px;
      height: 578.557px;
      position: relative;
      cursor: pointer;
      border: none;
      background: transparent;
      padding: 0;
      flex-shrink: 0;
    }

    /* Depth: dark bottom shadow edge */
    .key-depth {
      position: absolute;
      top: 2.56%; left: 0; right: 0; bottom: 0;
      border-radius: 46.234px;
      background: #161213;
      box-shadow:
        inset 0px 1.874px 0.852px 0px black,
        inset 0px 10.22px 1.277px -2.983px rgba(255,255,255,0.85);
      pointer-events: none;
    }

    /* Texture: colored key face */
    .key-texture {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 2.56%;
      border-radius: 46.234px;
      box-shadow:
        0px 8.091px 0.852px -2.983px rgba(255,255,255,0.55),
        inset 0px -1.703px 1.703px 1.119px rgba(0,0,0,0.75),
        inset 0px 1.874px 0.852px 0px black,
        inset 0px 10.22px 1.277px -2.983px rgba(255,255,255,0.85);
      pointer-events: none;
    }

    .keycap.red    .key-texture { background: linear-gradient(to bottom, #ff6f6f, #da1e1e); }
    .keycap.pink   .key-texture { background: linear-gradient(to bottom, #ffb6f3, #cd55c9); }
    .keycap.purple .key-texture { background: linear-gradient(to bottom, #e3b6ff, #a064ec); }
    .keycap.blue   .key-texture { background: linear-gradient(to bottom, #c1ecff, #72beea); }
    .keycap.green  .key-texture { background: linear-gradient(to bottom, #98ffd4, #2fd266); }

    /* Base oval: sheen highlight — shrinks on hover */
    .key-base {
      position: absolute;
      top: 11.05%; right: 14.67%; bottom: 16.19%; left: 13.8%;
      border-radius: 1181.447px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.62), rgba(255,255,255,0.85));
      filter: blur(1.478px);
      mix-blend-mode: overlay;
      pointer-events: none;
      transform-origin: center;
      transition: transform 0.15s ease;
    }

    /* Emoji — shrinks on hover */
    .key-emoji {
      position: absolute;
      top: 28.03%; right: 31.09%; bottom: 32.49%; left: 30.1%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 228.41px;
      line-height: 1;
      mix-blend-mode: luminosity;
      pointer-events: none;
      transform-origin: center;
      transition: transform 0.15s ease;
      user-select: none;
    }

    /* ── HOVER: base oval + emoji shrink ── */
    .keycap:hover .key-base,
    .keycap:hover .key-emoji {
      transform: scale(0.82);
    }
    /* After a press-to-pause, suppress the hover-shrink until the
       cursor leaves the key — JS adds .suppress-hover then removes
       it on mouseleave so the next hover behaves normally. */
    .keycap.suppress-hover:hover .key-base,
    .keycap.suppress-hover:hover .key-emoji {
      transform: none;
    }

    /* Active: texture presses down */
    .keycap:active .key-texture {
      transform: translateY(10px);
    }
    .keycap:active .key-base,
    .keycap:active .key-emoji {
      transform: scale(0.78) translateY(10px);
    }

    /* ── DIAL ──
       Centered at boy X (2908.758) and cricket Y (1067.997) in LARGE RECT.
       Native dial size from Figma: 601.766 × 603.515.
       Scaled down ~8% and nudged right per design adjustment. */
    .dial-container {
      position: absolute;
      left: 2657.875px;   /* original 2607.875, +50 right */
      top:  766.240px;    /* 1067.997 − 603.515/2 */
      width: 601.766px;
      height: 603.515px;
      filter: drop-shadow(0px 23.132px 14.11px rgba(0,0,0,0.25));
      transform: scale(0.92);
      transform-origin: center;
    }
    .dial-knob {
      width: 601.766px;
      height: 603.515px;
      border-radius: 50%;
      background: #2b2b2b;
      box-shadow: inset 0px -17.753px 2.367px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    /* Ellipse 850 — 579.7 × 579.7 circle with:
       - transparent→rgba(0,0,0,0.73) gradient (the shading)
       - 7.71px white-25% stroke (creates the visible vertical line in
         the middle of the dial, since the ellipse is rotated 90° and
         clipped, only its vertical edges show through). */
    .dial-ellipse {
      position: absolute;
      width: 579.727px;
      height: 579.727px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: linear-gradient(
        100deg,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.73) 100%
      );
      pointer-events: none;
    }
    /* The visible vertical bisecting line — recreates the stroke edge
       of the rotated ellipse where it cuts through the dial center. */
    .dial-ellipse::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 2%;
      bottom: 2%;
      width: 7.71px;
      transform: translateX(-50%);
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.25) 12%,
        rgba(255,255,255,0.25) 88%,
        rgba(255,255,255,0) 100%
      );
    }

    /* ── ROTARY ENCODER ──
       y-center aligned with the row-1 boom (💣) key center
       (boom-row Y center = 1067.997 in the 3931×4023 design space). */
    .rotary-encoder {
      position: absolute;
      left: 727.17px;
      top: 839.768px;   /* 1067.997 − 456.457/2 */
      width: 484.147px;
      height: 456.457px;
    }
    .rotary-encoder img { display: block; width: 100%; height: 100%; }

    /* ── FIGMA LOGO ──
       Native size 235.586 × 349.395 (proper 2:3 ratio, not squished).
       Centered at owl X (994.992) and mountain Y (3022.944). */
    .figma-logo {
      position: absolute;
      left: 877.199px;    /* 994.992 − 235.586/2 */
      top:  2848.246px;   /* 3022.944 − 349.395/2 */
      width: 235.586px;
      height: 349.395px;
    }
    .figma-logo img {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── SMILEY STICKER ── */
    .smiley {
      position: absolute;
      left: 2701.84px;
      top: 2815.2px;
      width: 381.968px;
      height: 381.968px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .smiley-inner {
      width: 287.553px;
      height: 287.553px;
      transform: rotate(24.93deg);
    }
    .smiley-inner img { display: block; width: 100%; height: 100%; }

    /* ── TEXT LABELS — Space Mono (per updated Figma design) ── */
    .text-label {
      position: absolute;
      font-family: 'Space Mono', monospace;
      font-size: 92.694px;
      color: #1c1c1c;
      white-space: nowrap;
      font-weight: 400;
      /* Isolate on its own compositor layer so neighboring keycap
         hover transitions don't trigger repaints/subpixel shifts on
         the rotated text. */
      will-change: transform;
      backface-visibility: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .text-soundkeypad {
      left: 3332.39px; top: 2232.98px;
      transform: translate(-50%,-50%) rotate(90deg);
    }
    .text-credits {
      left: 544.26px; top: 1970.45px;
      transform: translate(-50%,-50%) rotate(-90deg);
    }
    .text-tagline {
      left: 1940.89px; top: 3383.83px;
      transform: translate(-50%,-50%);
    }

    /* ── PATTERN DOTS ── */
    .dot {
      position: absolute;
      width: 38.283px;
      height: 38.245px;
      background: #d9d9d9;
      border-radius: 6.374px;
    }

    /* ── LEDs ── */
    .leds { position: absolute; left: 2792.73px; top: 2684px; }
    .led-wrap {
      position: absolute;
      width: 51.974px; height: 51.974px;
      display: flex; align-items: center; justify-content: center;
    }
    .led {
      width: 22.619px; height: 50.883px;
      border-radius: 4.635px;
      transform: rotate(45deg);
    }

    /* ── MOBILE: drop the effects that crash iOS Safari ──
       The device is laid out at 3931×4023px and scaled down via CSS
       transform. iOS Safari rasterizes backdrop-filter and the big
       inset shadows at the *pre-scale* size, which blows the per-tab
       memory cap and triggers the "A problem repeatedly occurred"
       reload loop. At phone scale the heavy effects are barely visible
       anyway — strip them. */
    @media (max-width: 900px), (hover: none) and (pointer: coarse) {
      .shell,
      .cutout {
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }
      .shell {
        box-shadow:
          inset 0px -80px 60px 0px rgba(255,255,255,0.55),
          inset 0px -110px 20px 0px rgba(0,0,0,0.7),
          inset 0px 40px 80px 0px rgba(24,24,24,0.45);
      }
      .cutout {
        box-shadow:
          inset 0px -60px 60px 0px rgba(255,255,255,0.5),
          inset 0px -22px 20px 0px rgba(0,0,0,0.55),
          inset 0px 40px 80px 0px rgba(24,24,24,0.4);
      }
      .usb-connector {
        box-shadow:
          inset 0px -110px 20px 0px rgba(0,0,0,0.83),
          inset 0px 40px 80px 0px rgba(24,24,24,0.45);
      }
      /* The plate texture is a multi-megabyte image pulled from a remote
         host and composited with mix-blend-mode — two big mobile costs
         for an effect that's invisible at phone scale. The updated
         Figma design removes it entirely. */
      .plate-texture { display: none; }
      /* Keycap blends (mix-blend-overlay on .key-base, mix-blend-luminosity
         on .key-emoji) and the .key-base blur stay enabled on mobile —
         they're cheap on small elements and the design relies on them
         for correct color. */
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="device-scale">

      <div class="shell"></div>
      <div class="cutout"></div>
      <div class="usb-connector"></div>

      <div class="plate">
        <div class="plate-texture"></div>
        <div class="screws">
          <div class="screw screw-tl">
            <img class="screw-bg" src="assets/screw.svg" alt="">
            <img class="screw-poly" src="assets/screw-slot.svg" alt="">
          </div>

            <img class="screw-bg" src="assets/screw.svg" alt="">

          <div class="screw screw-tr">

          </div>
          <div class="screw screw-br">
            <img class="screw-bg" src="assets/screw-alt.svg" alt="">

          <button class="keycap pink" data-sound="2">
            <div class="key-depth"></div><div class="key-texture"></div>

        </div>

        <!-- Row 2: 👏 💥 😁 👦 -->
        <div class="key-row">
          <button class="keycap red" data-sound="3">
            <div class="key-depth"></div><div class="key-texture"></div>
            <div class="key-base"></div><div class="key-emoji">👏</div>
          </button>
          <button class="keycap pink" data-sound="4">
            <div class="key-depth"></div><div class="key-texture"></div>

          </button>
          <button class="keycap purple" data-sound="5">
            <div class="key-depth"></div><div class="key-texture"></div>
            <div class="key-base"></div><div class="key-emoji">😁</div>
          </button>
          <button class="keycap blue" data-sound="6">
            <div class="key-depth"></div><div class="key-texture"></div>
            <div class="key-base"></div><div class="key-emoji">👦</div>
          </button>
        </div>

        <!-- Row 3: 🦉 🧠 😲 🎻 -->
        <div class="key-row">
          <button class="keycap pink" data-sound="7">
            <div class="key-depth"></div><div class="key-texture"></div>
            <div class="key-base"></div><div class="key-emoji">🦉</div>
          </button>
          <button class="keycap purple" data-sound="8">
            <div class="key-depth"></div><div class="key-texture"></div>
            <div class="key-base"></div><div class="key-emoji">🧠</div>
          </button>
          <button class="keycap blue" data-sound="9">
            <div class="key-depth"></div><div class="key-texture"></div>
            <div class="key-base"></div><div class="key-emoji">😲</div>

        <!-- Row 4: 🌋 👁️ -->

      <!-- Diagonal pattern dots (positions relative to LARGE RECT) -->

      <div class="dot" style="left:3273.34px;top:1464.70px"></div>
      <div class="dot" style="left:3311.61px;top:1502.95px"></div>
      <div class="dot" style="left:3349.90px;top:1541.19px"></div>
      <div class="dot" style="left:3273.34px;top:1388.22px"></div>
      <div class="dot" style="left:3311.61px;top:1426.47px"></div>
      <div class="dot" style="left:3349.90px;top:1464.70px"></div>
      <div class="dot" style="left:3273.34px;top:1541.18px"></div>
      <div class="dot" style="left:3311.61px;top:1579.43px"></div>
      <div class="dot" style="left:3349.90px;top:1617.67px"></div>
      <div class="dot" style="left:3273.34px;top:1617.67px"></div>
      <div class="dot" style="left:3311.61px;top:1655.91px"></div>
      <div class="dot" style="left:3349.90px;top:1694.15px"></div>

      <div class="leds">
        <div class="led-wrap" style="left:0;top:0">
          <div class="led" style="background:rgba(153,153,153,0.75)"></div>
        </div>
        <div class="led-wrap" style="left:75.15px;top:0">
          <div class="led" style="background:white;filter:blur(11.587px)"></div>
        </div>
        <div class="led-wrap" style="left:75.15px;top:0">
          <div class="led" style="background:white;box-shadow:0px 92.694px 92.694px 0px rgba(0,0,0,0.25)"></div>
        </div>
        <div class="led-wrap" style="left:150.3px;top:0">
          <div class="led" style="background:rgba(153,153,153,0.75)"></div>
        </div>
      </div>

    </div><!-- /device-scale -->
  </div><!-- /scene -->

  <script>
    /* ── Responsive fit ──
       Sizes the keypad so its larger dimension is at most 80% of the
       viewport's shorter side. That guarantees visible padding on all
       four sides of the keypad on every screen — including tall mobile
       portrait — while flexbox keeps it perfectly centered. Capped at
       0.14× so it doesn't grow past the desktop target size. */
    (function() {
      const DEVICE_W = 3931;
      const DEVICE_H = 4023.12;
      const MAX_SCALE = 0.14;
      const FIT_RATIO = 0.89;   /* % of vmin the keypad's long side fills —
                                   tuned so phones get ~6.5% padding/side
                                   (40% less than the previous 0.80 value).
                                   Tablets/desktops hit MAX_SCALE first so
                                   they're unaffected. */
      const scene = document.querySelector('.scene');
      const deviceScale = document.querySelector('.device-scale');

      function fit() {
        const vmin = Math.min(window.innerWidth, window.innerHeight);
        const scale = Math.min(MAX_SCALE, (vmin * FIT_RATIO) / DEVICE_H);

        scene.style.width  = (DEVICE_W * scale) + 'px';
        scene.style.height = (DEVICE_H * scale) + 'px';
        deviceScale.style.transform = 'scale(' + scale + ')';
      }

      window.addEventListener('resize', fit);
      window.addEventListener('orientationchange', fit);
      fit();
    })();

    /* ── Audio playback ──
       Uses lazy-created HTMLAudioElement instances (one per sound)
       rather than Web Audio API. Reasons:
         • Web Audio respects iPhone's silent-mode switch in a way
           that effectively muted ALL output for some users — even
           with a clean AudioContext.resume() inside the click handler.
           HTMLAudioElement is the more permissive path on iOS.
         • The original grey-tab Safari bug was caused by 12 inline
           <audio preload="auto"> tags pre-buffering megabytes of MP3
           on page load. Lazy creation + preload="none" sidesteps
           that completely — elements are created on demand and don't
           fetch their MP3 until play() is called from a user gesture. */
    (function() {
      const sounds = {
        '1':  'sounds/(1) boom.mp3',
        '2':  'sounds/(2) crickets.mp3',
        '3':  'sounds/(3) clapping.mp3',
        '4':  'sounds/(4) suspense.MP3',
        '5':  'sounds/(5) happy.MP3',
        '6':  'sounds/(6) bruh.mp3',
        '7':  'sounds/(7) inspirational.mp3',
        '8':  'sounds/(8) math.mp3',
        '9':  'sounds/(9) woah.mp3',
        '10': 'sounds/(10) sad violin.mp3',
        '11': 'sounds/(11) explosion.mp3',
        '12': 'sounds/(12) bombastic side eye.mp3'
      };

      const audioCache = {};
      let currentAudio = null;
      let currentId = null;

      function getAudio(id) {
        if (!audioCache[id]) {
          const a = new Audio();
          a.preload = 'none';     // don't fetch until play() — keeps memory low
          a.playsInline = true;   // iOS: keep audio inline, don't go fullscreen
          a.src = encodeURI(sounds[id]);
          audioCache[id] = a;
        }
        return audioCache[id];
      }

      function stopCurrent() {
        if (currentAudio) {
          currentAudio.pause();
          try { currentAudio.currentTime = 0; } catch (e) {}
          currentAudio = null;
          currentId = null;
        }
      }

      function play(id, key) {
        // Re-clicking after a pause should restore normal hover.
        if (key) key.classList.remove('suppress-hover');

        const isSame = currentId === id;
        stopCurrent();
        if (isSame) {
          // Press-to-pause: take this key out of its hover-shrink
          // state so it returns to original size while the cursor
          // is still over it.
          if (key) {
            key.classList.add('suppress-hover');
            key.addEventListener('mouseleave', () => {
              key.classList.remove('suppress-hover');
            }, { once: true });
          }
          return;
        }

        const audio = getAudio(id);
        try { audio.currentTime = 0; } catch (e) {}
        // play() is invoked synchronously inside the click handler so
        // iOS Safari treats it as user-initiated and allows playback.
        const p = audio.play();
        if (p && typeof p.then === 'function') {
          p.catch(() => {
            if (currentId === id) {
              currentAudio = null;
              currentId = null;
            }
          });
        }
        currentAudio = audio;
        currentId = id;

        audio.addEventListener('ended', () => {
          if (currentId === id) {
            currentAudio = null;
            currentId = null;
          }
        }, { once: true });
      }

      document.querySelectorAll('.keycap').forEach(key => {
        key.addEventListener('click', () => play(key.dataset.sound, key));
      });
    })();
  </script>
</body>
</html>
