<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miranda Su</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    font-family: "DM Mono", ui-monospace, monospace;
    background: #fff;
    color: #111;
  }

  .stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 214px;
  }

  .video-wrap {
    position: relative;
    width: 214px;
    height: 380px;
    overflow: hidden;
  }
  .video-wrap video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  /* Fade masks on all four sides */
  .video-wrap::before,
  .video-wrap::after,
  .video-wrap .fade-top,
  .video-wrap .fade-bottom {
    content: "";
    position: absolute;
    pointer-events: none;
  }
  .video-wrap::before {
    left: 0; top: 0; bottom: 0; width: 77px;
    background: linear-gradient(to right, #fff, rgba(255,255,255,0));
  }
  .video-wrap::after {
    right: 0; top: 0; bottom: 0; width: 77px;
    background: linear-gradient(to left, #fff, rgba(255,255,255,0));
  }
  .video-wrap .fade-top {
    left: 0; right: 0; top: 0; height: 77px;
    background: linear-gradient(to bottom, #fff, rgba(255,255,255,0));
  }
  .video-wrap .fade-bottom {
    left: 0; right: 0; bottom: 0; height: 77px;
    background: linear-gradient(to top, #fff, rgba(255,255,255,0));
  }

  .status {
    font-size: 12px;
    color: rgba(0, 0, 0, 0.5);
    margin: 0;
    text-align: center;
    font-weight: 300;
  }
  .status .dot {
    opacity: 0;
    animation-duration: 2s;
    animation-iteration-count: infinite;
    animation-timing-function: steps(1, end);
  }
  .status .dot:nth-child(1) { animation-name: dot1; }
  .status .dot:nth-child(2) { animation-name: dot2; }
  .status .dot:nth-child(3) { animation-name: dot3; }

  @keyframes dot1 { 0%, 24%  { opacity: 0; } 25%, 99% { opacity: 1; } }
  @keyframes dot2 { 0%, 49%  { opacity: 0; } 50%, 99% { opacity: 1; } }
  @keyframes dot3 { 0%, 74%  { opacity: 0; } 75%, 99% { opacity: 1; } }

  .socials {
    display: flex;
    gap: 14px;
    align-items: center;
    justify-content: center;
  }
  .socials a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 25.778px;
    height: 25.778px;
    color: #000;
    opacity: 0.5;
    transition: color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
  }
  .socials a svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .socials a:hover {
    transform: translateY(-4px);
    opacity: 1;
  }
  .socials a.instagram:hover { color: #FC81C5; }
  .socials a.x:hover         { color: #FE7814; }
  .socials a.linkedin:hover  { color: #9977FE; }
</style>
</head>
<body>
  <main class="stack">
    <div class="video-wrap">
      <video src="Miranda.mp4" autoplay muted loop playsinline></video>
      <div class="fade-top"></div>
      <div class="fade-bottom"></div>
    </div>

    <p class="status">still building<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>

    <div class="socials">
      <a class="instagram" href="https://www.instagram.com/mirandasuissocool/" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="1" width="22" height="22" rx="5.5"/>
          <circle cx="12" cy="12" r="5"/>
          <circle cx="18" cy="6" r="1.1" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <a class="x" href="https://x.com/mirandaiscoolz" target="_blank" rel="noopener" aria-label="X">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </a>
      <a class="linkedin" href="https://www.linkedin.com/in/miranda-suu/" target="_blank" rel="noopener" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
    </div>
  </main>

  <audio id="click-sfx" src="photowall/sound effects/next.mp3" preload="auto"></audio>

  <script>
    const sfx = document.getElementById('click-sfx');
    document.querySelectorAll('.socials a').forEach(link => {
      link.addEventListener('click', () => {
        try {
          sfx.currentTime = 0;
          sfx.play();
        } catch (e) {}
      });
    });
  </script>
</body>
</html>
